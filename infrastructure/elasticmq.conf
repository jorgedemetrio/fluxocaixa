include classpath("application.conf")

queues {
  lancamentos-eventos {
    defaultVisibilityTimeout = 30 seconds
    delay = 0 seconds
    receiveMessageWait = 20 seconds
    deadLettersQueue {
      name = "lancamentos-eventos-dlq"
      maxReceiveCount = 3
    }
  }
  lancamentos-eventos-dlq { }
}

node-address {
  protocol = http
  host = "*"
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = strict
}
