name: CI - Build, Test & Quality

on:
  push:
    branches: [ main, develop, 'feature/**', 'hotfix/**' ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  # ─── Lint e Build ──────────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore FluxoCaixa.sln

      - name: Build (Release)
        run: dotnet build FluxoCaixa.sln --no-restore -c Release -warnaserror

  # ─── Testes Unitários ──────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}

      - name: Restore
        run: dotnet restore FluxoCaixa.sln

      - name: Run unit tests - Lançamentos
        run: |
          dotnet test tests/FluxoCaixa.Lancamentos.UnitTests/FluxoCaixa.Lancamentos.UnitTests.csproj \
            --no-restore \
            --logger "trx;LogFileName=lancamentos-unit-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage/lancamentos

      - name: Run unit tests - Consolidado
        run: |
          dotnet test tests/FluxoCaixa.Consolidado.UnitTests/FluxoCaixa.Consolidado.UnitTests.csproj \
            --no-restore \
            --logger "trx;LogFileName=consolidado-unit-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage/consolidado

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            coverage/**/*.trx
            coverage/**/coverage.cobertura.xml

      - name: Code Coverage Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/**/coverage.cobertura.xml
          badge: true
          format: markdown
          output: both
          thresholds: '60 80'

  # ─── Testes de Integração ──────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fluxocaixa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}

      - name: Run integration tests
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=fluxocaixa_test;Username=postgres;Password=postgres"
          ConnectionStrings__Redis: "localhost:6379"
          Jwt__Issuer: "test-issuer"
          Jwt__Audience: "test-audience"
          Jwt__Secret: "test-secret-must-be-at-least-32-chars-long!!"
          ASPNETCORE_ENVIRONMENT: Test
        run: |
          dotnet test tests/FluxoCaixa.Integration.Tests/FluxoCaixa.Integration.Tests.csproj \
            --no-restore \
            --logger "trx;LogFileName=integration-results.trx" \
            --results-directory ./coverage/integration

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: coverage/integration/*.trx

  # ─── Análise de Segurança ──────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install security scanner
        run: dotnet tool install --global dotnet-retire

      - name: Scan for vulnerable packages
        run: dotnet retire --path . --outputformat json --outputfile retire-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: retire-report.json
